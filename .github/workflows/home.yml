name: Build

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15]
    runs-on: ${{ matrix.os }}

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install Nix with Flakes support
        uses: cachix/install-nix-action@v31.3.0

      - name: Configure Cachix
        uses: cachix/cachix-action@v16
        with:
          name: siraben
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build home-manager flake configuration
        run: |
          set -euo pipefail
          echo "OS: ${{ matrix.os }}"
          if [[ "${{ matrix.os }}" == "ubuntu-24.04" ]]; then
            echo "Building for Linux (siraben@x86_64-linux-headless)"
            nix build .#homeConfigurations."siraben@x86_64-linux-headless".activationPackage -L
          elif [[ "${{ matrix.os }}" == "macos-15" ]]; then
            echo "Building for macOS (siraben@aarch64-darwin-full)"
            nix build .#homeConfigurations."siraben@aarch64-darwin-full".activationPackage -L
          else
            echo "::error::Unsupported OS: ${{ matrix.os }}"
            exit 1
          fi
